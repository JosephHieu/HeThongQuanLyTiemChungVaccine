services:
  vax-db:
    image: nguyenhoanghieu1510/vax-db:v1
    container_name: vax-db
    ports:
      - "3310:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 123456
    volumes:
      - vax-db-data:/var/lib/mysql
    networks:
      - vax-network

  # 2. Backend Service
  vax-backend:
    image: nguyenhoanghieu1510/vaxtrack-backend:v1
    container_name: vax-backend
    depends_on:
      - vax-db
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://vax-db:3306/vaccine_management?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123456
      FRONTEND_URL: http://localhost:3000
    networks:
      - vax-network

  # 3. Frontend Service
  vax-frontend:
    image: nguyenhoanghieu1510/vaxtrack-frontend:v1
    container_name: vax-frontend
    depends_on:
      - vax-backend
    ports:
      - "3000:80"
    environment:
      VITE_API_BASE_URL: http://localhost:8080/api/v1
    networks:
      - vax-network

networks:
  vax-network:
    driver: bridge

volumes:
  vax-db-data:
